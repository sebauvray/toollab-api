name: Deploy API on production

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PROJECT_DIR: /home/githubdev/production/api

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: main

      - name: Deploy with rsync
        uses: burnett01/rsync-deployments@6.0.0
        with:
          switches: -avz --delete --exclude='.git*' --exclude='.github' --exclude='node_modules' --exclude='.env' --exclude='storage/'
          path: ./
          remote_path: ${{ env.PROJECT_DIR }}
          remote_host: ${{ secrets.SERVER_HOST }}
          remote_user: ${{ secrets.SERVER_USER }}
          remote_key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Run Docker Compose on server
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          script: |
            cd $PROJECT_DIR
            docker compose -f docker-compose.yml -f docker-compose-prod.yml up -d --build
            docker compose exec -T php php artisan storage:link || true